    <script>
        const monsterImg = document.getElementById('monster-img');
        const refuseBtn = document.getElementById('refuse-btn');
        const progressBar = document.getElementById('progress-bar');
        const handle = document.getElementById('slider-handle');
        const track = document.getElementById('slider-track');
        const bgMusic = document.getElementById('bg-music');
        const successSound = document.getElementById('success-sound');
        const beepSound = document.getElementById('beep-sound');
        const finalScreen = document.getElementById('final-screen');

        const img1 = "https://raw.githubusercontent.com/LumoCreator/AfrikankaHelp/refs/heads/main/IMG_2422.jpeg";
        const img2 = "https://raw.githubusercontent.com/LumoCreator/AfrikankaHelp/refs/heads/main/IMG_2423.jpeg";
        const img3 = "https://raw.githubusercontent.com/LumoCreator/AfrikankaHelp/refs/heads/main/IMG_2421.jpeg";
        const img4 = "https://raw.githubusercontent.com/LumoCreator/AfrikankaHelp/refs/heads/main/IMG_2424.jpeg";

        let holdProgress = 0;
        let holdInterval;
        let isSuccess = false;

        function initAudio() {
            bgMusic.play().catch(() => {});
        }

        // Логика кнопки "ОТКАЗАТЬ"
        refuseBtn.onmousedown = startHold;
        refuseBtn.ontouchstart = startHold;
        window.onmouseup = stopHold;
        window.ontouchend = stopHold;

        function startHold() {
            if (isSuccess) return;
            holdInterval = setInterval(() => {
                holdProgress += 1;
                progressBar.style.width = holdProgress + '%';

                if (holdProgress > 30 && holdProgress < 70) {
                    monsterImg.src = img2;
                } else if (holdProgress >= 70) {
                    monsterImg.src = img3;
                }

                if (holdProgress >= 100) {
                    clearInterval(holdInterval);
                    triggerFinal();
                }
            }, 30);
        }

        function stopHold() {
            clearInterval(holdInterval);
            if (holdProgress < 100) {
                holdProgress = 0;
                progressBar.style.width = '0%';
                if (!isSuccess) monsterImg.src = img1;
            }
        }

        function triggerFinal() {
            beepSound.play();
            setTimeout(() => {
                document.getElementById('main-content').style.display = 'none';
                finalScreen.style.display = 'flex';
            }, 500);
        }

        // Логика слайдера "ПОЖЕРТВОВАТЬ"
        let isDragging = false;

        handle.onmousedown = (e) => isDragging = true;
        handle.ontouchstart = (e) => isDragging = true;

        window.onmousemove = (e) => drag(e.clientX);
        window.ontouchmove = (e) => drag(e.touches[0].clientX);

        function drag(clientX) {
            if (!isDragging || isSuccess) return;
            
            let rect = track.getBoundingClientRect();
            let x = clientX - rect.left - 25;
            let maxX = rect.width - handle.offsetWidth - 10;

            if (x < 5) x = 5;
            if (x > maxX) {
                x = maxX;
                donationSuccess();
            }
            handle.style.left = x + 'px';
        }

        window.onmouseup = () => isDragging = false;

        function donationSuccess() {
            isSuccess = true;
            monsterImg.src = img4;
            successSound.play();
            handle.style.background = '#00ff00';
            document.querySelector('.slider-text').innerText = "ПОЖЕРТВОВАНО";
        }
    </script>
</body>
